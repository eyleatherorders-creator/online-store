<style>
button:hover {
  transform: translateY(-1px);
}

button {

.store-shell {
  max-width: 1500px;

}

.app-header {

}

.menu-panel {
  width: min(1180px, calc(100% - 24px));
  margin: 22px auto 10px;
  padding: 16px;
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.88);
  box-shadow: 0 24px 70px rgba(25, 31, 38, 0.18);
  backdrop-filter: blur(16px);
}

.menu-section {
  padding: 12px;
  border: 1px solid rgba(17, 24, 39, 0.08);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.74);
}

.menu-section + .menu-section {
  margin-top: 12px;
}

.menu-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 10px;
  color: #374151;
  font-size: 0.78rem;
  font-weight: 800;
}

.menu-label::before,
.menu-label::after {
  content: "";
  width: 42px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(55, 65, 81, 0.35));
}

.menu-label::after {
  background: linear-gradient(90deg, rgba(55, 65, 81, 0.35), transparent);
}

.selector-row:empty,
.menu-section:has(.selector-row:empty) {
  display: none;
}

.filter-btn {
  min-height: 44px;
  min-width: 94px;
  border-radius: 8px;
  font-weight: 800;
  box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
}

.filter-btn:hover {
  transform: translateY(-2px);
}

.search-form {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  align-items: stretch;
}

.search-input {
  min-height: 46px;
  flex: 1 1 280px;
  max-width: 520px;
  border: 1px solid rgba(15, 23, 42, 0.18);
  border-radius: 8px;
  background: #fff;
  padding: 0 16px;
  color: #111827;
  font-weight: 700;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75), 0 8px 20px rgba(15, 23, 42, 0.06);
}

.search-input:focus {
  border-color: #0f172a;
  box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.12);
}

.search-action {
  min-height: 46px;
  border-radius: 8px;
  padding: 0 22px;
  font-weight: 900;
  transition: all 0.2s ease;
}

.search-action.primary {
  border: 1px solid #0f172a;
  background: #0f172a;
  color: white;
}

.search-action.secondary {
  border: 1px solid rgba(15, 23, 42, 0.22);
  background: white;
  color: #334155;
}

.search-action:hover {
  transform: translateY(-2px);
}

.cart-policy-box {
  border: 1px solid rgba(15, 23, 42, 0.12);
  border-radius: 8px;
  background: #f8fafc;
  padding: 12px;
  color: #334155;
  font-size: 0.82rem;
  line-height: 1.55;
}

.customer-panel {
  width: min(1180px, calc(100% - 24px));
  margin: 14px auto 0;
  padding: 12px;
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.9);
  box-shadow: 0 16px 45px rgba(15, 23, 42, 0.14);
  backdrop-filter: blur(14px);
}

.customer-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  align-items: end;
}

.customer-field label {
  display: block;
  margin-bottom: 5px;
  color: #334155;
  font-size: 0.78rem;
  font-weight: 800;
}

.customer-field input,
.customer-field select {
  width: 100%;
  min-height: 42px;
  border: 1px solid rgba(15, 23, 42, 0.18);
  border-radius: 8px;
  background: white;
  padding: 0 12px;
  color: #111827;
  font-weight: 700;
  outline: none;
}

.customer-field input:focus,
.customer-field select:focus {
  border-color: #0f172a;
  box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.12);
}

@media (max-width: 640px) {
  .menu-panel {
    width: calc(100% - 16px);
    margin-top: 12px;
    padding: 10px;
  }

  .menu-section {
    padding: 10px;
  }

  .filter-btn {
    min-width: calc(50% - 8px);
    flex: 1 1 calc(50% - 8px);
  }

  .search-input,
  .search-action {
    width: 100%;
    max-width: none;
  }

  .customer-panel {
    width: calc(100% - 16px);
  }

  .customer-grid {
    grid-template-columns: 1fr;
  }
}
  /* --- image hover zoom --- */
.blend-area {
 
  position: relative;
}

.blend-area img {
  transition: transform 0.4s ease;
  transform-origin: center;
}

.blend-area:hover img {
  transform: scale(1.08);
}

  .blend-area .base { background:#fff }

 .blend-area {
  position: relative;
  width: 100%;
  height: 100%;
  isolation: isolate;
  background: transparent;
}

/* This is what the blend works against */
.blend-area .base {
  position: absolute;
  inset: 0;
  background: #fff; /* neutral */
}

.blend-area img {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  object-fit: contain;

  filter:
    contrast(1.08)
    brightness(1.02)
    saturate(1.05);
}

.sharp-layer {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.08);
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 4;
}


.color-layer {
  position: absolute;
  inset: 0;
  background: var(--cover-color);
  opacity: 0.55;              /* 🔑 control strength */
  pointer-events: none;
  z-index: 3;

  -webkit-mask-repeat: no-repeat;
  -webkit-mask-position: center;
  -webkit-mask-size: contain;

  mask-repeat: no-repeat;
  mask-position: center;
  mask-size: contain;
}
.leather-swatch {
    width: 46px;
    height: 38px;
    cursor: pointer;
    transition: transform 0.2s ease;
    /* This connects to the ID inside the <clipPath> */
    clip-path: url(#leatherClip);

  }

  .leather-swatch:hover {
    transform: scale(1.1);
  }

  .leather-swatch img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

<script>
// ===== STATE =====
let inventoryRows = [];
let cart = [];
let activeCategory = 'הכל';

// ===== INIT =====


// ===== RENDER =====

function getVisualColorFromCatalog(row) {
  const { color } = parseCatalogNumber(row.catalogNumber);

  const rule = CATALOG_RULES.color.find(r => r.code === color);
  return rule ? rule.visual : null;
}

 


function resolveProductMeta(name = "") {
  let bookType = "other";
  let gradient = null;
  let isPlate = false;

  // ---- book type ----
  for (const rule of BOOK_TYPE_RULES) {
    if (rule.match.some(w => name.includes(w))) {
      bookType = rule.folder;
      break;
    }
  }

  // ---- skin / gradient ----
  for (const rule of SKIN_RULES) {
    if (rule.match.some(w => name.includes(w))) {
      gradient = rule.gradient;
      break;
    }
  }

  // ---- plate design ----
  isPlate = PLATE_RULES.some(w => name.includes(w));

  return {
    bookType,     // "sidur"
    gradient,     // "vachetta" | null
    isPlate       // true / false
  };
}

function getColorFromName(name) {
  if (!name) return null;

  for (const rule of COLOR_RULES) {
    if (rule.match.some(word => name.includes(word))) {
      return rule.color;
    }
  }

  return null; // fallback
}

function applyColorByName(itemName) {
  const color = getColorFromName(itemName);

  if (color) {
    colorLayer.style.background = color;
    colorLayer.style.opacity = "1";
  } else {
    colorLayer.style.background = "transparent";
  }
}





// ===== RENDER SECON TRY ========
let selection = {
  bookType: null,
  publisher: null,
  size: null,
  color: null,
  design: null
};

let virtualProducts = [];
// ===== UI =====


function filterCategory(cat) {
  activeCategory = cat;
  renderProducts();
}

//modal code
let modalState = {};




function isFullCatalogNumber(catalog) {
  return !catalog.split("-").includes("0");
}



function createVirtualProduct(catalog) {
  const virtual = {
    catalogNumber: catalog,
    name: buildNameFromCatalog(catalog),
    total: 0,
    isVirtual: true
  };

  virtualProducts.push(virtual);
  return virtual;
}



function resolveModalRow() {
  const catalog = buildCatalogFromModal();

  return inventoryRows.find(
    r => r.catalogNumber === catalog
  ) || null;
}








</script>

<script>
function showToast(message) {
  const toast = document.createElement("div");
  
  // Center Positioning: top-1/2 left-1/2 + translate
  // Styling: bg-black/90 (slightly transparent black) and text-white
  toast.className = `
    fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 
    bg-black/90 text-white text-xl font-bold px-8 py-6 rounded-2xl shadow-2xl 
    z-[100] animate-center-toast text-center
  `;
  
  toast.innerHTML = `
    <div class="flex flex-col items-center gap-2">
     
      <div style="direction: rtl;">${message}</div>
    </div>
  `;

  document.body.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 2000);
}
</script>
